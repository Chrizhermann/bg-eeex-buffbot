name: Release Packaging

on:
  release:
    types: [published]

env:
  WEIDU_TAG: "v249.00"
  WEIDU_ASSET: "WeiDU-Windows-249-amd64.zip"

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG_NOV="${TAG#v}"

          TP2_VERSION=$(grep -E '^VERSION ~' buffbot/setup-buffbot.tp2 | sed -E 's/^VERSION ~([^~]+)~.*$/\1/')
          COR_VERSION=$(grep -E '^BfBot\.VERSION = "' buffbot/BfBotCor.lua | sed -E 's/^BfBot\.VERSION = "([^"]+)".*$/\1/')

          echo "Release tag:       $TAG"
          echo "tp2 VERSION:       $TP2_VERSION"
          echo "BfBotCor.VERSION:  $COR_VERSION"

          fail=0
          if [ "$TP2_VERSION" != "$TAG" ]; then
            echo "::error file=buffbot/setup-buffbot.tp2,line=3::tp2 VERSION ($TP2_VERSION) does not match release tag ($TAG)"
            fail=1
          fi
          if [ "$COR_VERSION" != "$TAG_NOV" ]; then
            echo "::error file=buffbot/BfBotCor.lua,line=9::BfBot.VERSION ($COR_VERSION) does not match release tag without v-prefix ($TAG_NOV)"
            fail=1
          fi
          [ "$fail" -eq 0 ] || exit 1

      - name: Download WeiDU
        run: |
          gh release download "$WEIDU_TAG" \
            --repo WeiDUorg/weidu \
            --pattern "$WEIDU_ASSET" \
            --dir /tmp/weidu
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract and rename WeiDU
        run: |
          cd /tmp/weidu
          unzip "$WEIDU_ASSET"
          WEIDU_PATH=$(find /tmp/weidu -iname 'weidu.exe' -type f | head -1)
          if [ -z "$WEIDU_PATH" ]; then
            echo "::error::weidu.exe not found in $WEIDU_ASSET"
            exit 1
          fi
          cp "$WEIDU_PATH" /tmp/setup-buffbot.exe
          echo "Found WeiDU at: $WEIDU_PATH"

      - name: Build release archive
        run: |
          TAG="${{ github.event.release.tag_name }}"
          STAGING="/tmp/buffbot-release"
          mkdir -p "$STAGING/buffbot"

          # WeiDU installer
          cp /tmp/setup-buffbot.exe "$STAGING/"

          # Mod files
          shopt -s nullglob
          cp buffbot/setup-buffbot.tp2 "$STAGING/buffbot/"
          cp buffbot/*.lua   "$STAGING/buffbot/"
          cp buffbot/*.menu  "$STAGING/buffbot/"
          cp buffbot/*.BAM   "$STAGING/buffbot/"
          cp buffbot/*.MOS   "$STAGING/buffbot/"
          cp buffbot/*.PVRZ  "$STAGING/buffbot/"

          # Docs
          cp README.md    "$STAGING/"
          cp CHANGELOG.md "$STAGING/"

          # Create zip (flat — player extracts directly into game dir)
          cd "$STAGING"
          zip -r "/tmp/buffbot-${TAG}.zip" .

          echo "Archive contents:"
          unzip -l "/tmp/buffbot-${TAG}.zip"

      - name: Upload release asset
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" \
            "/tmp/buffbot-${TAG}.zip" \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
